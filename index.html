<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="搶救大作戰 — 音樂樂理練習平台，提供音感、和弦、音程、節奏的互動式樂譜練習">
  <title>搶救大作戰 — 音樂樂理練習平台</title>
  <!-- 防止初次載入閃爍 — 在 CSS 載入前套用已儲存的主題偏好 -->
  <script>
    (function () {
      var theme = localStorage.getItem('theme-preference');
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- 頁首區域 -->
  <header id="app-header">
    <div class="header-inner">
      <div class="brand-group">
        <h1 class="site-title">
          <a href="#/" id="home-link"> 搶救大作戰</a>
        </h1>
        <p class="site-subtitle">音樂樂理練習平台</p>
      </div>
      <div class="header-actions">
        <!-- 訂購按鈕 (行銷亮點) -->
        <a href="http://www.musiker.com.tw/PicSearch.asp?page=1&action=1&anclassid=&jiage=&datestart=1996/1/1&dateend=2018/12/31&searchkey=%E3%80%8E%E6%90%B6%E6%95%91%E5%A4%A7%E4%BD%9C%E6%88%B0%E3%80%8F"
          target="_blank" class="header-cta-btn" aria-label="訂購教材">
          <span class="cta-icon">🛒</span>
          <span class="cta-text">訂購教材</span>
        </a>
        <!-- 主題切換按鈕 -->
        <button class="theme-toggle" id="theme-toggle" aria-label="切換主題">🌙</button>
      </div>
    </div>
  </header>

  <!-- Breadcrumb 導航 -->
  <nav id="breadcrumb" aria-label="導覽路徑">
    <ol class="breadcrumb-list"></ol>
  </nav>

  <!-- 佈局容器 -->
  <div class="app-layout-container">
    <!-- 側邊欄導航 (PC 端顯示) -->
    <aside id="app-sidebar" class="app-sidebar" aria-label="書籍目錄">
      <div class="sidebar-content">
        <!-- 內容由 JavaScript 動態渲染 -->
      </div>
    </aside>

    <!-- 主要內容區域 -->
    <main id="app-content">
      <!-- 視圖由 JavaScript 動態渲染 -->
      <div id="loading" class="loading-indicator" role="status" aria-live="polite">
        <span class="loading-spinner"></span>
        <span>載入中...</span>
      </div>
    </main>
  </div>

  <!-- 頁尾 -->
  <footer id="app-footer">
    <p>&copy; 樂韻出版社‧台北音樂家書房／出版.發行 2026</p>
  </footer>

  <!-- AlphaTab 透過 CDN 引入 -->
  <script type="module" src="js/app.js"></script>
</body>

</html>
