<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="搶救大作戰 — 音樂樂理練習平台，提供音感、和弦、音程、節奏的互動式樂譜練習">
  <title>搶救大作戰 — 音樂樂理練習平台</title>
  <link rel="icon" href="/favicon.ico">
  <!-- 防止初次載入閃爍 — 在 CSS 載入前套用已儲存的主題偏好 -->
  <script>
    (function () {
      var theme = localStorage.getItem('theme-preference');
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>

<body>
  <!-- Vue 3 應用程式掛載點 -->
  <div id="app"></div>

  <!-- Vite 入口（由 src/main.js 接管，CSS 也在此引入） -->
  <script type="module" src="/src/main.js"></script>
</body>

</html>
