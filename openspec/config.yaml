schema: spec-driven
locale: tw
parallel_tasks: true

context: |
  # 專案：搶救大作戰 — 音樂樂理練習平台
  提供學生練習音感、和弦、音程、節奏的互動式樂譜練習平台。

  ## 技術棧
  - 原生 JavaScript (ES Modules)、HTML5、CSS3
  - AlphaTab（樂譜渲染 + MIDI 合成器播放，透過 CDN 引入）
  - 無需打包工具，純靜態 HTML/CSS/JS

  ## 架構
  - 純靜態網站，無後端、無打包流程
  - 單頁應用，使用 hash-based routing
  - MusicXML 格式的樂譜檔案（約 10,000 個檔案）
  - manifest.json 作為所有樂譜的靜態索引

  ## 資料結構（四層樹狀階層）
  - 書籍 (Book)：音感練習篇、和弦練習篇、音程練習篇、節奏練習篇.壹、節奏練習篇.貳
  - 音色 (Tone)：Piano、Flute、Strings（同一首曲子，不同樂器演奏）
  - 章節 (Chapter)：例如 P.1 單音無升降練習
  - 曲目 (Song)：例如 No.1、No.2、...

  ## 導航方式
  - 逐步鑽入 (Drill-down)：書籍 → 章節 → 曲目 → 播放器
  - 音色以 Tab 切換呈現於播放器頁面，不佔導航層級

  ## 播放器功能
  - 播放 / 暫停 / 停止
  - 前進 / 後退（在小節之間移動）
  - 播放速度調整（tempo 控制）
  - 上下移調（共 30 種變化）
  - 段落循環（選取範圍反覆播放）
  - 音色切換（鋼琴 / 長笛 / 弦樂 Tab 切換）

  ## 設計需求
  - RWD 響應式設計：桌機、平板、手機
  - 語言：繁體中文
  - 現代、乾淨且具質感的 UI 設計
  - 部署方式：靜態託管（GitHub Pages、Netlify 或任何 Web Server）

  ## 開發慣例
  - 使用 ES Modules（import/export）
  - 使用 CSS Custom Properties 管理主題色彩
  - Mobile-first 響應式設計
  - 使用語義化 HTML5 標籤
  - 所有文件與註解使用繁體中文撰寫，技術術語保留英文原文

rules:
  proposal:
    - 所有 UI 變更須包含 RWD 響應式設計考量
    - 設計功能時須考慮萬筆樂譜的資料規模
    - 音樂相關功能須標註使用的 AlphaTab API
  - 所有文件與註解使用繁體中文撰寫，技術術語保留英文原文
  tasks:
    - 任務拆分為小型、可獨立測試的單元
    - 播放器相關任務須參照 AlphaTab API 文件
    - UI 任務須涵蓋手機、平板、桌機三種裝置的設計
    - 所有文件與註解使用繁體中文撰寫，技術術語保留英文原文
  spec:
    - 音樂功能須詳述播放器互動細節
    - UI 規格須記錄響應式斷點設定
    - 所有文件與註解使用繁體中文撰寫，技術術語保留英文原文
